version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:8080/api/v1
      NEXT_PUBLIC_AI_BASE_URL: http://ai:8000
      NEXT_PUBLIC_SOCKET_URL: http://api:8080
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      AI_SERVICE_URL: http://ai:8000
    depends_on:
      - ai

  ai:
    build:
      context: .
      dockerfile: services/ai/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
