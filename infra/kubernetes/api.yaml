apiVersion: apps/v1
kind: Deployment
metadata:
  name: campus-api
  namespace: campus-bandhu
spec:
  replicas: 2
  selector:
    matchLabels:
      app: campus-api
  template:
    metadata:
      labels:
        app: campus-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/campus-bandhu-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8080"
            - name: CORS_ORIGIN
              value: "https://app.campus-bandhu.com"
            - name: AI_SERVICE_URL
              value: "http://campus-ai:8000"
            - name: JWT_AUDIENCE
              value: "campus-bandhu"
            - name: JWT_ISSUER
              value: "https://securetoken.google.com/campus-bandhu"
---
apiVersion: v1
kind: Service
metadata:
  name: campus-api
  namespace: campus-bandhu
spec:
  type: ClusterIP
  selector:
    app: campus-api
  ports:
    - port: 8080
      targetPort: 8080
