apiVersion: apps/v1
kind: Deployment
metadata:
  name: campus-web
  namespace: campus-bandhu
spec:
  replicas: 2
  selector:
    matchLabels:
      app: campus-web
  template:
    metadata:
      labels:
        app: campus-web
    spec:
      containers:
        - name: web
          image: ghcr.io/your-org/campus-bandhu-web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: "https://api.campus-bandhu.com/api/v1"
            - name: NEXT_PUBLIC_AI_BASE_URL
              value: "https://ai.campus-bandhu.com"
            - name: NEXT_PUBLIC_SOCKET_URL
              value: "https://api.campus-bandhu.com"
---
apiVersion: v1
kind: Service
metadata:
  name: campus-web
  namespace: campus-bandhu
spec:
  type: ClusterIP
  selector:
    app: campus-web
  ports:
    - port: 3000
      targetPort: 3000
