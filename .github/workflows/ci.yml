name: CAMPUS-BANDHU CI

on:
  push:
    branches: ["main", "develop", "codex/**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  ai-service-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install AI deps
        run: |
          python -m pip install --upgrade pip
          pip install -r services/ai/requirements.txt
      - name: Validate AI app import
        run: python -c "from app.main import app; print(app.title)"
        working-directory: services/ai
